{% set root = "../" %}
{% extends "src/njk/base.njk" %}

{% block title %}팝업 안내 | Vite + Nunjucks + Sass 템플릿{% endblock %}

{% block content %}
<section class="container" style="padding: 80px 0; text-align: center; max-width: 640px; margin: 0 auto;">
  <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 20px; color: #f8fafc;">팝업 컴포넌트 전역 이관 완료</h2>
  <p style="color: #94a3b8; font-size: 1.1rem; line-height: 1.7; margin-bottom: 40px;">
    기존 팝업 안내 페이지에 있던 팝업 UI를 공통 레이아웃(<code>base.njk</code>)으로 옮겨 전역 페이지에 적용하였습니다.<br>
    이제 메인 홈 화면을 포함한 모든 페이지에서 팝업이 정상 작동합니다.
  </p>
  <div>
    <a href="{{ root }}index.html" class="btn btn-primary">홈 화면으로 가서 테스트하기</a>
  </div>
</section>
{% endblock %}
