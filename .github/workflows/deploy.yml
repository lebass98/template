name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # 수동 실행도 허용
  workflow_dispatch:

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중인 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. 빌드 ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 의존성 설치
        run: npm ci

      - name: 🔨 프로덕션 빌드
        run: npm run build

      - name: 📤 Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 2. 배포 ──────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
